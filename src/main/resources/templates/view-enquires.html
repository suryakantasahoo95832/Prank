<!doctype html>
<html lang="en" xmlns:th="www.thymeleaf.org">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bootstrap demo</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
	crossorigin="anonymous">
	
	<script src="/webjars/jquery/3.7.1/jquery.min.js"></script>
	
	<script>
	
	$(document).ready(function(){
		$(".form-select").on("change", function(e){
			$.ajax({
				type : "GET" ,
				url : "filter",
				data : {
					cname : $("#cname").val(),
					status : $("#status").val(),
					mode : $("#mode").val()
				},
				success : function(result){
					$("#tbl").hide();
					$("#filterTbl").html(result);
				}
			});
		});
		
	});
	
	
	</script>
	
	
</head>
<body>
	
	
	
	
	<div>

		<nav class="navbar navbar-expand-lg"
			style="background-color: #f2f2f2;">
			<div class="container-fluid ms-4 ">
				<a class="navbar-brand" href="#"><img alt=""
					src="suryalogo.png " width="130" height="50" class="ps-4" ></a>
				<button class="navbar-toggler" type="button"
					data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
					aria-controls="navbarSupportedContent" aria-expanded="false"
					aria-label="Toggle navigation">
					<span class="navbar-toggler-icon"></span>
				</button>
				<div class="collapse navbar-collapse" id="navbarSupportedContent">
					<ul class="navbar-nav me-auto mb-2 mb-lg-0">
						<li class="nav-item"><a class="nav-link active"
							aria-current="page" href="dashboard">Home</a></li>
						<li class="nav-item"><a class="nav-link" href="enquiry">Add
								Enquiry</a></li>

						<li class="nav-item"><a class="nav-link" href="enquires">View
								Enquires</a></li>

					</ul>
					<a href="/" class="btn btn-danger me-5">Logout</a>
				</div>
			</div>
		</nav>
</div>
	
	
	
	<div class="container mt-5 pt-5 px-5" style="background-color: #f8f9fa;">
	
	<h3 class="pb-4" style="text-align: center; ">View Student Enquiries</h3>
	
	<div class="row pb-4">
	
	
	
	<div class="col-md-4">
	 
	 <label>Course</label>
	 
	 <select class="form-select" id="cname" >
	 
	 <option value="">--Select--</option>
	  <option th:each="course:${courses}" th:value="${course}" th:text="${course}" ></option>
	 
	 
	 
	 
	 </select>

      
      
	</div>
	
	
	<div class="col-md-4">
 
	 <label>Enquiry Status</label>
	 
	 <select  class="form-select" id="status" >
	 
	 <option value="">--Select--</option>
	 <option th:each="status:${statuses}" th:value="${status}" th:text="${status}" ></option>
	 
	 
	 
	 </select>

	</div>
	
	
	<div class="col-md-4">
	 
	 <label>Class Mode</label>
	 
	 <select  class="form-select" id="mode" >
	 
	 <option value="">--Select--</option>
	 <option value="Online">Online</option>
	 <option value="Offline">Offline</option>
	 
	 
	 </select>

	</div>
	
	

	
	</div>
	
	<div id="filterTbl"> </div>
	
	   <table class="table table-bordered table-striped" id="tbl">
        <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Course</th>
                <th>Number</th>
                <th>Enquiry Date</th>
                <th>Status</th>
                <th>Mode</th>
                <th>Action</th>
            </tr>
        </thead>
	
	<tbody>
	
	 <tr th:each="student : ${list}">
                <td th:text="${student.studentName}"></td>
                <td th:text="${student.courseName}"></td>
                <td th:text="${student.phno}"></td>
                <td th:text="${student.createdDate}"></td>
                <td th:text="${student.enquiryStatus}"></td>
                <td th:text="${student.classMode}"></td>
                <td>
                   <a th:href="@{/edit(id=${student.enquiryId})}" class="btn btn-warning me-4">Edit</a>
                    <a class="btn btn-danger">Delete</a>
                </td>
            </tr>
	
	
	
	
	
	</tbody>
	
	
	</table>
	
	
	
	</div>
	
	
	
	
	
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous">
	
	</script>
</body>
</html>
