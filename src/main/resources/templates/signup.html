
   <!DOCTYPE html>
<html lang="en" xmlns:th="www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Surya IT Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    .full-height {
      height: 100vh;
    }
    .gradient-bg {
      background: linear-gradient(to right, #6a11cb, #2575fc);
      color: white;
    }
    .login-box {
      max-width: 400px;
      width: 100%;
    }
    .btn-login {
      background-color: #dc3545;
      color: white;
    }
    .btn-create {
      background-color: #007bff;
      color: white;
    }
    .logo {
      font-size: 2rem;
      font-weight: bold;
    }
  </style>
</head>
<body class="pt-3">
  <div class="container mt-5">
    <div class="row h-100">
      <!-- Left Side: Login Form -->
      <div class="col-md-6 d-flex align-items-center justify-content-center bg-light">
        <div class="login-box text-center">
          <div class="logo mb-4 mt-2"><a href="/"><img alt="" src="suryalogo.png " width="130" height="80"></a></div>
          <h5 class="mb-3">Please Create Account Here</h5>
          
          <p th:text="${sucmsg}" class="text-success	"></p>
          <p th:text="${unsucmsg}" class="text-danger"></p>
          
          <form th:action="@{/signup}" th:object="${user}" method="POST" >
            <div class="mb-3 text-start">
              
              <input type="text" class="form-control" placeholder="Enter Name" th:field="*{userName}">
            </div>
            <div class="mb-3 text-start">
            
              <input type="email" class="form-control" placeholder="Enter Email" th:field="*{email}">
            </div>
            
            <div class="mb-3">
            
             <input type="number" class="form-control" placeholder="Phone num" th:field="*{phno}">
            
            </div>
            
           <button type="submit" class="btn btn-login w-100 mb-2">Sign Up</button>
            
             <div class="mb-3 text-start">
            
            <label>Do you have an Account?</label>
            <a href="login">Login Here</a>
             
            </div>
            
          </form>
        </div>
      </div>

      <!-- Right Side: Gradient Info -->
      <div class="col-md-6 gradient-bg d-flex align-items-center justify-content-center text-center p-4">
        <div>
          <h3>Surya IT Solution is more than just a Software Training Institute</h3>
          <p class="mt-3">Student Satisfaction is most important for us.</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
