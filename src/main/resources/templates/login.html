
  
   <!DOCTYPE html>
<html lang="en" xmlns:th="www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Surya IT Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    .full-height {
      height: 100vh;
    }
    .gradient-bg {
      background: linear-gradient(to right, #6a11cb, #2575fc);
      color: white;
    }
    .login-box {
      max-width: 400px;
      width: 100%;
    }
    .btn-login {
      background-color: #dc3545;
      color: white;
    }
    .btn-create {
      background-color: #007bff;
      color: white;
    }
    .logo {
      font-size: 2rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container mt-5">
    <div class="row h-100">
      <!-- Left Side: Login Form -->
      <div class="col-md-6 d-flex align-items-center justify-content-center bg-light">
        <div class="login-box text-center">
          <div class="logo mb-4 mt-2"><a href="/"><img alt="" src="suryalogo.png " width="130" height="80"></a></div>
          <h5 class="mb-3">Please login to your account</h5>
          
          <p th:text="${errmsg}" class="text-danger"></p>
          
          
          <form th:action="@{/login}" th:object="${login}" method="POST">
            <div class="mb-3 text-start">
              <label class="form-label">User name</label>
              <input type="text" class="form-control" placeholder="Enter phone or email" th:field="*{userName}">
            </div>
            <div class="mb-3 text-start">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" placeholder="Enter password" th:field="*{password}">
            </div>
            
            <button type="submit" class="btn btn-danger">Login</button>
            
            <a href="forgot" class="d-block mb-3 text-danger">Forgot password?</a>
            <p>Don't have an account?</p>
           <a href="signup" class="btn btn-danger">CREATE NEW</a>
          </form>
        </div>
      </div>

      <!-- Right Side: Gradient Info -->
      <div class="col-md-6 gradient-bg d-flex align-items-center justify-content-center text-center p-4">
        <div>
          <h3>Surya IT Solution is more than just a Software Training Institute</h3>
          <p class="mt-3">Student Satisfaction is most important for us.</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
